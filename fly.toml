# Fly.io deployment configuration
# Deploy with: fly launch (first time) or fly deploy (updates)

app = "ulw-app"

[[vm]]
  size = "performance-1x"
  memory_mb = 4096

primary_region = "iad"

[mounts]
  source = "data"
  destination = "/data"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

  [http_service.http_options]
    h2_backend = false
    idle_timeout = 900

  [[http_service.checks]]
    grace_period = "30s"
    interval = "10s"
    method = "GET"
    path = "/health"
    timeout = "5s"
    [http_service.checks.headers]
      X-Forwarded-Proto = "https"
