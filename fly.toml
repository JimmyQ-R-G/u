# Fly.io deployment configuration
# Deploy with: fly launch (first time) or fly deploy (updates)
# App name must match your Fly app (e.g. studyboard.fly.dev -> app = "studyboard")

app = "studyboard"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

primary_region = "sjc"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"

# Persistent volume for session storage. The app writes session files to
# /data/sessions (see src/config.js). Without this mount, session files
# live on the ephemeral rootfs and are wiped every time the machine
# restarts (deploy, health-check failure, infra maintenance, etc.), which
# causes "Generate Link" never-expire URLs to silently stop working.
#
# One-time setup (per Fly region/machine). Volumes MUST be created in the
# same region as the machine that will mount them -- check with
# `fly machines list -a studyboard` and use that region below:
#   fly volumes create data --region <region> --size 1
# After the volume exists, `fly deploy` will auto-attach it on the next
# machine boot. If you scale to multiple machines in the same region you
# must create one volume per machine (fly volumes list).
[mounts]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  # Use 1 machine so all requests hit the same session store (no Redis needed).
  # For 6+ machines: set Upstash secrets and change to min_machines_running = 6.
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 1000
    soft_limit = 800

  [http_service.http_options]
    idle_timeout = 900

  [[http_service.checks]]
    grace_period = "60s"
    interval = "10s"
    method = "GET"
    path = "/health"
    timeout = "5s"
    [http_service.checks.headers]
      X-Forwarded-Proto = "https"
