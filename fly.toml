# Fly.io deployment configuration
# Deploy with: fly launch (first time) or fly deploy (updates)

app = "ulw"

[[vm]]
  size = "shared-cpu-1x"
  memory_mb = 512

primary_region = "sjc"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"
  PATH_STYLE = "cdn-cgi/p"
  SINGLE_PROCESS = "1"
  STUDYBOARD_BRAND = "_a"

[mounts]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 1000
    soft_limit = 800

  [http_service.http_options]
    h2_backend = false
    idle_timeout = 900

  [[http_service.checks]]
    grace_period = "60s"
    interval = "10s"
    method = "GET"
    path = "/health"
    timeout = "5s"
    [http_service.checks.headers]
      X-Forwarded-Proto = "https"
