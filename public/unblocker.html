<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f13;color:#e0e0e0;height:100vh;overflow:hidden}
.loader-wrap{text-align:center;display:flex;flex-direction:column;align-items:center;gap:24px;width:100%;max-width:420px;padding:0 20px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.loader-text{font-size:18px;font-weight:500;letter-spacing:.5px;color:#b0b0c0}
.progress-wrap{width:100%;display:flex;flex-direction:column;gap:10px}
.progress-track{width:100%;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#6c63ff,#a78bfa);border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.progress-info{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#6c6c80}
.progress-stage{text-align:left}
.progress-pct{font-variant-numeric:tabular-nums}
.loader-url{font-size:13px;color:#6c6c80;max-width:480px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.error{color:#e74c3c;font-size:14px;display:none;max-width:480px;line-height:1.5}
#frame{position:fixed;top:0;left:0;width:100%;height:100%;border:none;display:none;z-index:10}
</style>
</head>
<body>
<div class="loader-wrap" id="loader">
    <div class="loader-text">Loading</div>
    <div class="progress-wrap">
        <div class="progress-track"><div class="progress-bar" id="progress-bar"></div></div>
        <div class="progress-info">
            <span class="progress-stage" id="progress-stage">Initializing&hellip;</span>
            <span class="progress-pct" id="progress-pct">0%</span>
        </div>
    </div>
    <div class="loader-url" id="target-url"></div>
    <div class="error" id="error"></div>
</div>
<iframe id="frame"></iframe>
<script>
(function() {
    var params  = new URLSearchParams(location.search);
    var url     = params.get('url');
    var targetEl = document.getElementById('target-url');
    var errorEl  = document.getElementById('error');
    var loader   = document.getElementById('loader');
    var frame    = document.getElementById('frame');
    var barEl    = document.getElementById('progress-bar');
    var stageEl  = document.getElementById('progress-stage');
    var pctEl    = document.getElementById('progress-pct');

    // ========== Progress helpers ==========
    var progress = 0, trickleTimer = null;
    function setProgress(v, stage) {
        progress = Math.min(v, 100);
        barEl.style.width = progress + '%';
        pctEl.textContent = Math.round(progress) + '%';
        if (stage) stageEl.textContent = stage;
    }
    function startTrickle(from, ceil) {
        clearInterval(trickleTimer);
        progress = from; setProgress(from);
        trickleTimer = setInterval(function() {
            if (progress >= ceil) { clearInterval(trickleTimer); return; }
            setProgress(progress + Math.max(0.15, (ceil - progress) * 0.04));
        }, 200);
    }
    function stopTrickle() { clearInterval(trickleTimer); }

    // ========== Base path ==========
    var basePath = location.pathname.startsWith('/rammerhead') ? '/rammerhead' : '';

    // ========== URL Shuffler (mirror of server StrShuffler) ==========
    var _shufflerBase = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz~-';
    var _shuffledInd  = '_rhs';
    var _mod = function(n, m) { return ((n % m) + m) % m; };
    var _shuffler = null;

    function StrShuffler(dict) { this.dictionary = dict; }
    StrShuffler.prototype.shuffle = function(str) {
        if (str.indexOf(_shuffledInd) === 0) return str;
        var out = '';
        for (var i = 0; i < str.length; i++) {
            var ch = str.charAt(i), idx = _shufflerBase.indexOf(ch);
            if (ch === '%' && str.length - i >= 3) { out += ch; out += str.charAt(++i); out += str.charAt(++i); }
            else if (idx === -1) { out += ch; }
            else { out += this.dictionary.charAt(_mod(idx + i, _shufflerBase.length)); }
        }
        return _shuffledInd + out;
    };
    StrShuffler.prototype.unshuffle = function(str) {
        if (str.indexOf(_shuffledInd) !== 0) return str;
        str = str.slice(_shuffledInd.length);
        var out = '';
        for (var i = 0; i < str.length; i++) {
            var ch = str.charAt(i), idx = this.dictionary.indexOf(ch);
            if (ch === '%' && str.length - i >= 3) { out += ch; out += str.charAt(++i); out += str.charAt(++i); }
            else if (idx === -1) { out += ch; }
            else { out += _shufflerBase.charAt(_mod(idx - i, _shufflerBase.length)); }
        }
        return out;
    };

    function ensureUnshuffled(candidate) {
        if (!candidate || typeof candidate !== 'string') return candidate;
        if (candidate.indexOf('http://') === 0 || candidate.indexOf('https://') === 0) return candidate;
        if (!_shuffler) return null;
        var toUn = candidate.indexOf(_shuffledInd) === 0 ? candidate : (_shuffledInd + candidate);
        try {
            var real = _shuffler.unshuffle(toUn);
            return (real && (real.indexOf('http://') === 0 || real.indexOf('https://') === 0)) ? real : null;
        } catch (_) {}
        return null;
    }

    function extractRealUrl(proxyUrl, iframeWin) {
        var raw = null;
        try {
            if (iframeWin) {
                var hh = iframeWin['%hammerhead%'];
                if (hh && hh.utils && hh.utils.url && hh.utils.url.parseProxyUrl) {
                    var parsed = hh.utils.url.parseProxyUrl(proxyUrl);
                    if (parsed && parsed.destUrl) raw = parsed.destUrl;
                }
            }
        } catch (_) {}
        if (raw !== null) {
            var un = ensureUnshuffled(raw);
            if (un) return un;
        }
        try {
            var match = proxyUrl.match(/\/([a-f0-9]{32})[^\/]*\/(.+)/);
            if (match) {
                var urlPart = match[2];
                var un2 = ensureUnshuffled(urlPart);
                if (un2) return un2;
                if (urlPart.indexOf(_shuffledInd) !== 0) return urlPart.indexOf('http') === 0 ? urlPart : null;
            }
        } catch (_) {}
        return null;
    }

    // ========== Session management ==========
    function genSession() {
        return Array.from(crypto.getRandomValues(new Uint8Array(16)))
            .map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
    }
    var sessionId = null;
    try { sessionId = localStorage.getItem('deviceSessionId'); } catch(_){}
    if (!sessionId) { sessionId = genSession(); try { localStorage.setItem('deviceSessionId', sessionId); } catch(_){} }

    // ========== URL normalization (same as main proxy) ==========
    function normalizeUrl(raw) {
        raw = raw.trim();
        var rawPrefix = '';
        if (raw.indexOf('raw!') === 0) { rawPrefix = 'raw!'; raw = raw.slice(4); }
        if (/^https?:\/\//i.test(raw) || /^[a-zA-Z0-9][a-zA-Z0-9-]{1,61}[a-zA-Z0-9]\.[a-zA-Z]{2,}/.test(raw)) {
            if (!/^https?:\/\//i.test(raw)) raw = 'https://' + raw;
            try { var u = new URL(raw); if (u.pathname === '' || u.pathname === '/') raw = u.origin + '/'; } catch (_) {}
        } else {
            raw = 'https://www.google.com/search?q=' + encodeURIComponent(raw);
        }
        return rawPrefix + raw;
    }

    // ========== Current state ==========
    var currentRealUrl = '';
    var lastBroadcastUrl = '';

    // ========== Parent (embed) messaging ==========
    // When this page is iframed (e.g. inside jimmyqrg.github.io), keep the
    // host informed about which real URL is currently loaded so its address
    // bar / history can stay in sync, and accept navigation commands back.
    function inIframe() {
        try { return window.self !== window.top; } catch (_) { return true; }
    }
    function postToParent(msg) {
        if (!inIframe()) return;
        try { window.parent.postMessage(msg, '*'); } catch (_) {}
    }
    function broadcastUrl(url, title) {
        if (!url || url === lastBroadcastUrl) return;
        lastBroadcastUrl = url;
        postToParent({ type: 'jqrg:url-changed', url: url, title: title || '' });
    }

    window.addEventListener('message', function(ev) {
        var d = ev && ev.data;
        if (!d || typeof d !== 'object') return;
        if (d.type === 'jqrg:navigate' && typeof d.url === 'string') {
            var u = d.url;
            if (d.raw === true && u.indexOf('raw!') !== 0) u = 'raw!' + u;
            navigateProxy(u);
        } else if (d.type === 'jqrg:ping') {
            postToParent({ type: 'jqrg:ready', url: currentRealUrl || '' });
        }
    }, false);

    // ========== Core: load a URL through the proxy ==========
    function navigateProxy(inputUrl) {
        var rawMode = false;
        if (inputUrl.indexOf('raw!') === 0) { rawMode = true; inputUrl = inputUrl.slice(4); }
        var normalized = normalizeUrl(inputUrl);
        currentRealUrl = rawMode ? 'raw!' + normalized : normalized;
        document.title = currentRealUrl;
        broadcastUrl(currentRealUrl, '');

        if (rawMode) {
            frame.src = basePath + '/' + sessionId + '!raw/' + normalized;
            return;
        }

        fetch(basePath + '/getproxiedurl?id=' + encodeURIComponent(sessionId) + '&url=' + encodeURIComponent(normalized))
            .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
            .then(function(data) {
                frame.src = data.proxiedUrl || (basePath + '/' + sessionId + '/' + normalized);
            })
            .catch(function() {
                fetch(basePath + '/ensuresession?id=' + encodeURIComponent(sessionId)).catch(function(){});
                frame.src = basePath + '/' + sessionId + '/' + normalized;
            });
    }

    // ========== iframe onload: sync title, intercept window.open/close ==========
    function onFrameLoad() {
        try { if (!_shuffler) fetchShuffler(); } catch (_) {}

        var iframeWin, iframeDoc;
        try { iframeWin = frame.contentWindow; iframeDoc = frame.contentDocument || iframeWin.document; } catch (_) { return; }

        // Sync real URL for title
        try {
            var href = iframeWin.location.href;
            var dest = extractRealUrl(href, iframeWin);
            if (dest) currentRealUrl = dest;
        } catch (_) {}

        // Title & favicon
        try { document.title = iframeDoc.title || currentRealUrl; } catch (_) { document.title = currentRealUrl; }
        try {
            var fav = iframeDoc.querySelector('link[rel="icon"]') || iframeDoc.querySelector('link[rel="shortcut icon"]');
            if (fav) {
                var favHref = fav.getAttribute('href');
                if (favHref) {
                    var favUrl = (favHref.indexOf('http') === 0 || favHref.indexOf('data:') === 0)
                        ? favHref : new URL(favHref, iframeWin.location.href).href;
                    var link = document.querySelector('link[rel="icon"]');
                    if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
                    link.href = favUrl;
                }
            }
        } catch (_) {}

        // Intercept window.open → navigate in this same proxy frame
        try {
            iframeWin.open = function(openUrl, target) {
                if (!openUrl) return makeMockWindow();
                var resolved;
                try { resolved = new URL(openUrl, currentRealUrl).href; } catch (_) { resolved = openUrl; }
                navigateProxy(normalizeUrl(resolved));
                return makeMockWindow();
            };
        } catch (_) {}

        // Intercept window.close
        try {
            iframeWin.close = function() { frame.src = 'about:blank'; };
        } catch (_) {}

        // Notify the embedding parent of the real URL the user is now on.
        // This is what lets the host page (e.g. jimmyqrg.github.io) keep its
        // address bar updated when links are clicked inside the proxied page.
        try {
            var titleNow = '';
            try { titleNow = iframeDoc.title || ''; } catch (_) {}
            broadcastUrl(currentRealUrl || '', titleNow);
        } catch (_) {}
    }

    function makeMockWindow() {
        return {
            closed: false, focus: function(){}, blur: function(){},
            close: function() { this.closed = true; },
            postMessage: function(){},
            location: { href: '', replace: function(){}, assign: function(){} },
            document: { write: function(){}, writeln: function(){}, close: function(){} },
            opener: null
        };
    }

    frame.onload = onFrameLoad;

    // ========== Fetch shuffler dict ==========
    function fetchShuffler() {
        if (_shuffler) return;
        var qs = '?id=' + encodeURIComponent(sessionId);
        fetch(basePath + '/_a/sd' + qs)
            .then(function(r) { return r.ok ? r.text() : Promise.reject(); })
            .catch(function() {
                return fetch(basePath + '/api/shuffleDict' + qs).then(function(r) { return r.text(); });
            })
            .then(function(t) {
                if (typeof t !== 'string') return;
                var dict = JSON.parse(t);
                if (dict) _shuffler = new StrShuffler(dict);
            })
            .catch(function(){});
    }

    // ========== Show frame (transition from loader) ==========
    function showFrame() {
        stopTrickle();
        setProgress(100, 'Complete');
        setTimeout(function() {
            loader.style.display = 'none';
            frame.style.display = 'block';
            document.body.style.background = '#fff';
        }, 300);
    }

    // ========== Entry point ==========
    var rawParam = params.get('raw') === 'true';

    if (!url) {
        errorEl.textContent = 'Missing ?url= parameter.';
        errorEl.style.display = 'block';
        return;
    }

    var normalized = normalizeUrl(url);
    currentRealUrl = normalized;
    postToParent({ type: 'jqrg:ready', url: currentRealUrl });
    broadcastUrl(currentRealUrl, '');

    if (rawParam) {
        loader.style.display = 'none';
        frame.style.display = 'block';
        document.body.style.background = '#fff';
        document.title = normalized;

        fetch(basePath + '/ensuresession?id=' + encodeURIComponent(sessionId))
            .then(function() {
                fetchShuffler();
                return fetch(basePath + '/getproxiedurl?id=' + encodeURIComponent(sessionId) + '&url=' + encodeURIComponent(normalized));
            })
            .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
            .then(function(data) {
                frame.src = data.proxiedUrl || (basePath + '/' + sessionId + '/' + normalized);
            })
            .catch(function() {
                frame.src = basePath + '/' + sessionId + '/' + normalized;
            });
        return;
    }

    targetEl.textContent = normalized;
    document.title = normalized;

    setProgress(5, 'Setting up session\u2026');
    startTrickle(5, 25);

    fetch(basePath + '/ensuresession?id=' + encodeURIComponent(sessionId))
        .then(function() {
            stopTrickle();
            setProgress(30, 'Resolving\u2026');
            startTrickle(30, 48);
            fetchShuffler();
            return fetch(basePath + '/getproxiedurl?id=' + encodeURIComponent(sessionId) + '&url=' + encodeURIComponent(normalized));
        })
        .then(function(r) {
            if (!r.ok) throw new Error('Server error: ' + r.status);
            return r.json();
        })
        .then(function(data) {
            stopTrickle();
            setProgress(50, 'Loading page\u2026');
            startTrickle(50, 95);
            frame.src = data.proxiedUrl || (basePath + '/' + sessionId + '/' + normalized);
            frame.onload = function() { showFrame(); onFrameLoad(); };
        })
        .catch(function() {
            stopTrickle();
            setProgress(50, 'Loading page\u2026');
            startTrickle(50, 95);
            frame.src = basePath + '/' + sessionId + '/' + normalized;
            frame.onload = function() { showFrame(); onFrameLoad(); };
        });

    setTimeout(function() {
        if (frame.style.display !== 'block') showFrame();
    }, 15000);
})();
</script>
</body>
</html>
